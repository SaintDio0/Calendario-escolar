{% extends 'base.html' %}
{% block title %}Excluir Aviso{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <h2 class="h4">Excluir aviso</h2>
        <p>Tem certeza que deseja excluir o aviso <strong>{{ object.titulo }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger">Sim, excluir</button>
            <a class="btn btn-outline-secondary" href="{% url 'avisos:lista' %}">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
