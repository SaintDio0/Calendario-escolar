{% extends 'base.html' %}
{% block title %}Detalhes do Aviso{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <div class="d-flex justify-content-between mb-3">
            <h2 class="h4 mb-0">{{ aviso.titulo }}</h2>
            <a class="btn btn-outline-secondary btn-sm" href="{% url 'avisos:lista' %}">Voltar</a>
        </div>
        <p class="text-muted">Publicado em {{ aviso.data_publicacao|date:'d/m/Y H:i' }}</p>
        <p>{{ aviso.mensagem|linebreaks }}</p>
    </div>
</div>
{% endblock %}
